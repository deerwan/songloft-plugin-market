<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="128" cy="128" r="128" fill="url(#bg)"/>

  <!-- 发光效果 -->
  <circle cx="128" cy="128" r="108" fill="url(#glow)"/>

  <!-- 音符主体（八分音符） -->
  <!-- 符干 -->
  <rect x="128" y="52" width="8" height="130" rx="4" fill="#ffffff"/>
  <!-- 符头 -->
  <ellipse cx="108" cy="175" rx="26" ry="20" fill="#ffffff" transform="rotate(-20 108 175)"/>
  <!-- 符尾/钩 -->
  <path d="M136 110 C 156 126, 176 118, 172 100 C 168 86, 150 90, 136 102" fill="#ffffff"/>

  <!-- 右侧装饰性高音点 -->
  <circle cx="124" cy="40" r="4" fill="#93c5fd"/>
  <circle cx="140" cy="28" r="3" fill="#93c5fd"/>

  <!-- 音符周围声波装饰 -->
  <path d="M82 100 C 66 120, 66 150, 82 170" stroke="#93c5fd" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M62 84 C 38 110, 38 160, 62 186" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.35"/>
</svg>