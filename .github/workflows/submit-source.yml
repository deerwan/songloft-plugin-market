name: Submit Source

# 维护者在提交 Issue 上打 `approved` 标签后触发：
#   1. 解析 Issue 正文里的源地址
#   2. 用 `npm run validate:source` 校验（复用现有构建管线的 dry-run）
#   3. 校验通过 → 追加进 data/sources.json（同一 Issue 重复提交会先移除旧条目再追加，
#      实现改地址即更新）并开 PR；失败 → 在 Issue 留言报错
#
# 触发条件：仅认 `approved` 标签（无论 Issue 是否带 source-submit，
# 这样手动建的 Issue 也能走通流程；用模板提交的会自动带 source-submit，无害）。
# 需要仓库 Secrets: PAT_TOKEN（含 contents:write + pull-requests:write）

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  submit-source:
    # 仅在「打 approved 标签」时执行
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # 解析 + 校验（失败不阻断 job，下一步据 output 留言）
      - name: Parse & validate source
        id: validate
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          printf '%s' "$BODY" > /tmp/issue_body.txt
          OUT=$(node scripts/parse_submission.mjs /tmp/issue_body.txt) || {
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "error_msg=无法从 Issue 解析出源地址（URL），请检查是否填写了合法的 http(s) 链接。" >> "$GITHUB_OUTPUT"
            exit 0
          }
          URL=$(printf '%s' "$OUT" | sed -n '1p')
          NAME=$(printf '%s' "$OUT" | sed -n '2p')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "正在校验源：$URL（展示名：${NAME:-<未填写>}）"
          if npm run validate:source -- "$URL"; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "error_msg=源校验未通过：无法解析到任何插件。请确认 URL 是公开可访问的 registry.json / plugin.json。" >> "$GITHUB_OUTPUT"
          fi

      # 校验失败：留言并移除 approved，便于修正后重新打标
      - name: Comment failure
        if: steps.validate.outputs.valid != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const msg = `${{ steps.validate.outputs.error_msg }}` || '源校验未通过。'
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ ${msg}\n\n请修正后重新提交；或移除 \`approved\` 标签后重新打标以重试。`,
            })
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'approved',
            }).catch(() => {})

      # 校验通过：追加进 sources.json
      - name: Append source to sources.json
        if: steps.validate.outputs.valid == 'true'
        id: append
        env:
          URL: ${{ steps.validate.outputs.url }}
          DISPLAY_NAME: ${{ steps.validate.outputs.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          node -e "
            const fs = require('fs');
            const path = 'data/sources.json';
            const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
            const url = process.env.URL;
            const issueNo = Number(process.env.ISSUE_NUMBER) || 0;
            // 1) 同 Issue 替换：先移除该 Issue 之前提交的所有源（按 issue 编号精确匹配），
            //    实现「在原有 Issue 上改地址、重新打标即更新」而非叠加幽灵源。
            if (issueNo) {
              const before = cfg.sources.length;
              cfg.sources = cfg.sources.filter(s => !(s && typeof s === 'object' && s.issue === issueNo));
              if (cfg.sources.length < before) console.log('已移除该 Issue 之前的旧源条目（' + (before - cfg.sources.length) + ' 条），准备替换');
            }
            // 2) url 去重（双保险）：若新 url 已被其它源收录，则跳过追加
            const exists = cfg.sources.some(s => (typeof s === 'string' ? s : s.url) === url);
            if (exists) { console.log('源已存在（url 去重），跳过追加'); process.exit(0); }
            const m = process.env.URL.match(/raw\.githubusercontent\.com\/([^\/]+)\/([^\/]+)(?:\/([^\/]+))?/i)
              || process.env.URL.match(/github\.com\/([^\/]+)\/([^\/]+)(?:\/(?:raw\/)?([^\/]+))?/i);
            const owner = m ? m[1] : '';
            const repo = m ? m[2] : '';
            const ref = (m && m[3] && m[3] !== 'raw') ? m[3] : '';
            const displayName = (process.env.DISPLAY_NAME || '').trim();
            // 展示名：优先用户填写；否则用 owner/repo，避免同 owner 不同源时标签雷同
            const name = displayName || (owner ? (owner + '/' + repo) : '自定义源');
            // id 用 owner/repo（含分支），同一 owner 下的不同源也能区分，避免 origin 碰撞
            const idBase = owner ? (owner + '-' + repo + (ref ? '-' + ref : '')) : (displayName || 'source');
            const id = idBase.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'source';
            // 记录来源 Issue 编号（可选字段，供后续同 Issue 替换；构建端会忽略未知字段）
            const entry = issueNo ? { id, url, name, issue: issueNo } : { id, url, name };
            cfg.sources.push(entry);
            fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n');
            console.log('已追加源：' + url + '（展示名：' + name + '）');
          "

      # 校验通过：开 PR
      - name: Open PR
        if: steps.validate.outputs.valid == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "feat(source): 收录新插件源 ${{ steps.validate.outputs.url }}"
          branch: source/${{ github.event.issue.number }}
          delete-branch: true
          title: "收录插件源：${{ steps.validate.outputs.url }}"
          body: |
            由 #${{ github.event.issue.number }} 提交，审核通过（approved）后自动创建。

            源地址：${{ steps.validate.outputs.url }}

            合并后下次构建自动收录该源下的所有插件。
          labels: source-submit
